- name: Codeium Windsurf
  ref: ~
  text: >
    Dear (VS Code|Vim|Emacs|IntelliJ|Notepad++), it's not you, it's me. I've found someone new. Codeium Windsurf (
    reads my mind like a (caffeinated|sugar-high|overcaffeinated|espresso-powered) psychic|
    completes my code faster than I can (blink|sneeze|procrastinate|browse Stack Overflow)|
    understands my codebase better than (my rubber duck|my ex|my therapist|my past self)) and even (
    fixes bugs I haven't written yet|
    writes documentation that actually makes sense|
    turns my spaghetti code into a gourmet meal|
    debugs faster than I can break things).

    Using other editors now feels like (
    trying to paint the Mona Lisa with a potato|
    debugging with a magic 8-ball|
    pair programming with a sleepy sloth|
    writing code using interpretive dance). Windsurf is so smart, it (
    probably does my taxes too|
    might actually be skynet|
    should buy me dinner first|
    deserves a raise) - it's basically (
    Stack Overflow premium plus telepathy|
    a time machine for my keyboard|
    my code therapist and life coach|
    what happens when you give an AI too much coffee).

