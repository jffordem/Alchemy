<!doctype html>
<html lang="en">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/madlibs.css') }}">

    <title>Madlibs</title>
</head>
<body class="madlib-theme">

<div class="container madlib-container">

    <div class="row">
        <section class="col-12">

            <nav class="madlib-nav d-flex">
                <a href="{{url_for('home')}}">Home</a>
                <span>Madlibs</span>
                <a href="{{url_for('about')}}">About</a>
                <a href="#" id="theme-toggle" class="ml-auto">Toggle Theme</a>
            </nav>

            <div class="text-center">
                <h1>Madlibs</h1>

                <ul class="madlib-list">
                    {% for name in names %}
                    <li><a href="{{url_for('madlibs', name=name)}}">{{name}}</a></li>
                    {% endfor %}
                </ul>
            </div>

            <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
            <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>

        </section>
    </div>
</div>

<script>
    // Theme toggle functionality
    document.addEventListener('DOMContentLoaded', function() {
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        
        // Check if user has a saved preference
        const savedTheme = localStorage.getItem('madlibTheme');
        if (savedTheme === 'skyrim') {
            body.classList.remove('madlib-theme');
            body.classList.add('skyrim-theme');
        }
        
        themeToggle.addEventListener('click', function(e) {
            e.preventDefault();
            if (body.classList.contains('madlib-theme')) {
                body.classList.remove('madlib-theme');
                body.classList.add('skyrim-theme');
                localStorage.setItem('madlibTheme', 'skyrim');
            } else {
                body.classList.remove('skyrim-theme');
                body.classList.add('madlib-theme');
                localStorage.setItem('madlibTheme', 'madlib');
            }
        });
    });
</script>
</body>
</html>
