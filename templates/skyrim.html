<!doctype html>
<html lang="en">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <!-- Google Fonts - Cinzel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/skyrim.css') }}">

    <title>Skyrim Alchemy</title>
</head>
<body>

<div class="container">
    <div class="row mt-4">
        <div class="col-12 text-center">
            <h1 class="display-4">Skyrim Alchemy</h1>
            <div class="my-4" style="height: 2px; background: linear-gradient(90deg, rgba(131, 109, 69, 0) 0%, rgba(131, 109, 69, 0.8) 50%, rgba(131, 109, 69, 0) 100%);"></div>
        </div>
    </div>

    <div class="row">
        <section class="col-12">
            <nav class="skyrim-nav d-flex">
                <a href="{{url_for('home')}}" class="ml-3">Home</a>
                <span class="mx-3">Skyrim Alchemy</span>
                <a href="{{url_for('about')}}" class="ml-auto mr-3">About</a>
            </nav>

            <div class="mt-4">
                <h2 class="text-center mb-4">Menu</h2>
                
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="list-group">
                            <a href="{{url_for('skyrim_ingredients')}}" class="list-group-item d-flex align-items-center">
                                <span class="skyrim-icon icon-ingredient"></span>
                                <span>Ingredients</span>
                                <i class="fas fa-chevron-right ml-auto"></i>
                            </a>
                            <a href="{{url_for('skyrim_effects')}}" class="list-group-item d-flex align-items-center">
                                <span class="skyrim-icon icon-effect"></span>
                                <span>Effects</span>
                                <i class="fas fa-chevron-right ml-auto"></i>
                            </a>
                            <a href="{{url_for('skyrim_potions', limit=100)}}" class="list-group-item d-flex align-items-center">
                                <span class="skyrim-icon icon-potion"></span>
                                <span>Potions</span>
                                <i class="fas fa-chevron-right ml-auto"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
            <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
        </section>
    </div>
</div>

</body>
</html>
